<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graffita - Gestão de Produtos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">}">
</head>
<body>
    <header>
        <div class="container">
            <h1>Graffita Dev</h1>
            <div class="login-simulado">
                <label for="usuario-ativo">Logado como:</label>
                <select id="usuario-ativo">
                    <option value="">Ninguém selecionado</option>
                </select>
            </div>
        </div>
    </header>

    <nav class="abas-container">
        <div class="container">
            <button class="aba ativa" data-tipo="usuarios">Usuários</button>
            <button class="aba" data-tipo="produtos">Produtos</button>
            <button class="aba" data-tipo="enderecos">Endereços</button>
            <button class="aba" data-tipo="favoritos">Favoritos</button>
            <button class="aba" data-tipo="carrinhos">Carrinho</button>
            <button class="aba" data-tipo="mensagens">Mensagens</button>
        </div>
    </nav>

    <main class="container">
        <section id="sessao-formulario">
            <h2 id="titulo-formulario">Novo registro</h2>
            <form id="formulario">
                <div id="campos" class="grade-campos"></div>
                <div class="acoes-form">
                    <button type="submit" class="botao-sucesso">Cadastrar</button>
                    <p id="mensagem-formulario"></p>
                </div>
            </form>
        </section>

        <hr>

        <section id="sessao-lista">
            <div class="topo-lista">
                <h2 id="titulo-lista">Registros</h2>
                <button id="botao-recarregar" class="botao-secundario">Recarregar Lista</button>
            </div>
            <p id="status" class="status-msg">Carregando...</p>
            <div class="tabela-wrapper">
                <table id="tabela">
                    <thead><tr id="cabecalho"></tr></thead>
                    <tbody id="corpo"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
