<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
  <main class="cadastro-pagina">
    <section class="cadastro-card">
      <div class="cabecalho-card">
        <div>
          <p class="eyebrow">Cadastro</p>
          <h1>Novo usuário</h1>
          <p>Preencha os campos abaixo para criar um usuário rapidamente.</p>
        </div>
      </div>

      <form id="cadastro-form">
        <div class="campo">
          <label for="nome">Nome completo</label>
          <input id="nome" name="nome" type="text" placeholder="Seu nome" required>
        </div>

        <div class="campo">
          <label for="email">E-mail</label>
          <input id="email" name="email" type="email" placeholder="seu@exemplo.com">
        </div>

        <div class="campo">
          <label for="senha">Senha</label>
          <input id="senha" name="senha" type="password" placeholder="Senha segura" required>
        </div>

        <div class="campo">
          <label for="cpf">CPF</label>
          <input id="cpf" name="cpf" type="text" placeholder="000.000.000-00" required>
        </div>

        <p id="mensagem" class="mensagem"></p>

        <button type="submit" class="botao-primario">Cadastrar usuário</button>
      </form>

      <p class="link-voltar">Voltar para <a href="/">página principal</a></p>
    </section>
  </main>
  <script src="{{ url_for('static', filename='cadastro.js') }}"></script>
</body>
</html>
